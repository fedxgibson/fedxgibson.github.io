<html><head><meta charset=utf-8><meta http-equiv=X-UA-Compatible content="IE=edge"><title>Federico Martinez</title><meta name=description><meta name=viewport content="width=device-width, initial-scale=1, user-scalable=no"><link href="https://fonts.googleapis.com/css?family=Raleway:100,100i,200,200i,300,300i,400,500i,600,600i,700,700i,800" rel=stylesheet><link rel=stylesheet href=assets/main.min.css></head><body><!--partial:partials/_nav.html--><div class=fat-nav><div id=nav-bar class=fat-nav__wrapper><ul><li><a href=#/home data-link=home-link>Home</a></li><li><a href=#/about data-link=about-link>About</a></li><li><a href=#/experience data-init=timeline data-link=experience-link>Experience</a></li><li><a href=#/skills data-link=skills-link>Skills</a></li><li><a href=#/contact data-link=contact-link>Contact</a></li></ul></div></div><!--partial--><div id=main class="pt-page pt-page-current"></div><!--partial:partials/_main.html--><script id=template-home type=text/x-handlebars-template><div class="banner"> <h1 class="name">FEDERICO MARTINEZ</h1> <p class="text-center ">Building awesome pieces of code...with passion</p> <button class="button"> <a href="#/about">About Me</a> </button> </div></script><!--partial--><!--partial:partials/_about.html--><script id=template-about type=text/x-handlebars-template><div class="text-centered"> <h1>About me</h1> <div class="about"> <p> I am a Software Engineer with a Full Stack development background. Since the beginning I have always been an eager learner, not only looking for good practices and techniques, but also adopting ones of my own. I always look forward to find the most elegant solution to a problem, that's why I am not afraid of changing paradigms if that is what it takes. </p> <p> As I described myself, my true nature implies looking for innovative technologies for incorporating into new projects as well as state-of-the-art development techniques. My biggest concern is not just delivering a good product for the client, but always thinking ahead of maintainability not only for myself, but for my team and other developers so they find it easy start developing and it is clear where to do it. </p> <p> I have high standards for satisfaction, what makes me challenge my own development in favor of improvement. </p> <p> I enjoy learning from and helping other people. A sharing environment promotes personal and professional growth to each team member, which translates into an awesome human team and ultimately, a great experience. </p> </div> </div></script><!--partial--><!--partial:partials/_experience.html--><script id=template-experience type=text/x-handlebars-template><div class="text-centered"> <h1>Experience</h1> </div> <div class="timeline timeline-experience" data-vertical-start-position="right" data-vertical-trigger="150px"> <div class="timeline__wrap"> <div class="timeline__items"> <div class="timeline__item timeline__item--right fadeIn"> <div class="timeline__content"> <h3 class="job-title">Rootstrap</h3> <div class="job-title"> <strong>Full Stack Developer</strong> </div> <div class="job-period"> January 2015 - December 2017 </div> </div> </div> <div class="timeline__item timeline__item--left fadeIn"> <div class="timeline__content"> <h3 class="job-title">Tarmac</h3> <div class="job-title"> <strong>Full Stack Developer</strong> </div> <div class="job-period"> June 2018 </div> </div> </div> <div class="timeline__item timeline__item--right fadeIn"> <div class="timeline__content"> <h3 class="job-title">UdelaR</h3> <div class="job-title"> <strong>Software Engineer</strong> </div> <div> July 2018 </div> </div> </div> </div> </div> </div></script><!--partial--><!--partial:partials/_skills.html--><script id=template-skills type=text/x-handlebars-template><div class="text-centered"> <h1>This is my toolbox</h1> </div> <div class="tool-boxes"> <div class="tool-box"> <div> <h4>Backened</h4> <div> <ul> <li>Ruby on Rails</li> <li>Postgres</li> <li>MySQL</li> <li>MongoDB</li> <li>Data Structures</li> <li>API</li> <li>Amazon Web Services (AWS)</li> </ul> </div> </div> </div> <div class="tool-box"> <div> <h4>Frontend</h4> <div> <ul> <li>HTML</li> <li>CSS</li> <li>Javascript</li> <li>jQuery</li> <li>Angular</li> <li>React</li> <li>Gulp</li> <li>Grunt</li> </ul> </div> </div> </div> <div class="tool-box"> <div> <h4>Engineer</h4> <div> <ul> <li>Analysis</li> <li>Design</li> <li>Implementation</li> <li>Automated Testing</li> <li>Scalability</li> </ul> </div> </div> </div> <div class="tool-box"> <div> <h4>Testing</h4> <div> <ul> <li>TDD</li> <li>BDD</li> <li>Cypress</li> </ul> </div> </div> </div> </div></script><!--partial--><!--partial:partials/_contact.html--><script id=template-contact type=text/x-handlebars-template><div class="text-centered"> <h1>Contact</h1> <p>You can contact me through</p> <div class="contact-list"> <div class="contact-logo"> <img src="assets/img/git.png"/> </div> <div class="contact-logo"> <img src="assets/img/linkedin.png"/> </div> <div class="contact-logo"> <img src="assets/img/mail.png"/> </div> </div> </div></script><!--partial--><script src=https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js></script><script type=text/javascript src=assets/main.min.js></script></body></html>
